name: pages build and deployment

on:
  schedule:
    - cron: "0 0 * * *"   # 00:00 UTC = 09:00 KST
  workflow_dispatch: {}

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      SNN_OPENALEX_CONTACT: ${{ vars.OPENALEX_CONTACT || 'bhkim003@snu.ac.kr' }}
      OPENALEX_API_KEY: ${{ secrets.OPENALEX_API_KEY }}
    outputs:
      deploy_sha: ${{ steps.commit_and_push.outputs.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Fetch papers and build site (daily)
        env:
          SNN_DAILY_DAYS: "30"
          SNN_MAX_DAILY_OPENALEX: "1000"
          SNN_MAX_DAILY_ARXIV: "1000"
        run: python3 scripts/build_site.py --daily

      - name: Commit and push changes
        id: commit_and_push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/papers.json docs/index.html
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: update SNN paper list [skip ci]"
            git push
          fi
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

  deploy:
    needs: update
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.update.outputs.deploy_sha }}

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
