name: pages build and deployment

on:
  schedule:
    - cron: "0 0 * * *"   # 00:00 UTC = 09:00 KST
  workflow_dispatch:
    inputs:
      s2_max:
        description: "Semantic Scholar max fetch"
        required: false
        default: "3000"
      arxiv_max:
        description: "arXiv max fetch"
        required: false
        default: "200"

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      deploy_sha: ${{ steps.commit_and_push.outputs.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Fetch papers and build site
        env:
          # Optional: add a free Semantic Scholar API key as a repo secret
          # to get higher rate limits. Leave unset to use the public API.
          S2_API_KEY: ${{ secrets.S2_API_KEY }}
          SNN_MAX_S2: ${{ github.event.inputs.s2_max || '3000' }}
          SNN_MAX_ARXIV: ${{ github.event.inputs.arxiv_max || '200' }}
        run: python3 scripts/build_site.py

      - name: Commit and push changes
        id: commit_and_push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/papers.json docs/index.html
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: update SNN paper list [skip ci]"
            git push
          fi
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

  deploy:
    needs: update
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.update.outputs.deploy_sha }}

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
